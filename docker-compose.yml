name: tevunah

services:
  postgres:
    image: postgres:16-alpine
    container_name: tevunah-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tevunah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tevunah}
      POSTGRES_DB: ${POSTGRES_DB:-tevunah}
      # Consumidos pelo init script 01_roles.sh
      APP_DB_USER: ${APP_DB_USER:-tevunah_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-tevunah_app}
      AUDIT_DB_USER: ${AUDIT_DB_USER:-tevunah_audit_writer}
      AUDIT_DB_PASSWORD: ${AUDIT_DB_PASSWORD:-tevunah_audit_writer}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tevunah} -d ${POSTGRES_DB:-tevunah}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tevunah

  # ─── Importação do legado (profile "import") ─────────────────────────
  # Serviços sob `profiles: [import]` ficam dormentes em `./tevunah up` e
  # só sobem quando o fluxo de importação é disparado. Liberam recursos
  # quando a migração estiver consolidada.

  mysql-legacy:
    # MySQL temporário pra receber o dump do sistema legado (Laravel). É
    # uma estação intermediária — pgloader lê daqui e converte pro Postgres.
    # tmpfs porque os dados não precisam persistir entre execuções.
    # Pin em 8.0: o 8.4+ removeu a opção default-authentication-plugin (movida
    # pra authentication_policy) e mudou defaults — manter 8.0 evita surpresa
    # e cobre o pgloader sem ajustes adicionais.
    image: mysql:8.0
    container_name: tevunah-mysql-legacy
    profiles: [import]
    restart: "no"
    # pgloader não suporta o plugin caching_sha2_password (default no MySQL 8) —
    # forçamos o plugin clássico mysql_native_password pra autenticação.
    command:
      - "--default-authentication-plugin=mysql_native_password"
    environment:
      MYSQL_ROOT_PASSWORD: legacy
      MYSQL_DATABASE: legacy
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      # mysqladmin ping volta OK antes do root estar realmente pronto pra
      # accept connections com senha. Validamos com SELECT real.
      test: ["CMD-SHELL", "mysql -uroot -plegacy -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s
    networks:
      - tevunah

  pgloader:
    # Conversor MySQL → Postgres. Roda one-shot (--rm) durante o import,
    # populando o schema `legacy` do Postgres a partir do MySQL temporário.
    image: dimitri/pgloader:latest
    container_name: tevunah-pgloader
    profiles: [import]
    restart: "no"
    depends_on:
      mysql-legacy:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/db/import:/etc/pgloader:ro
    command: ["pgloader", "/etc/pgloader/mysql-to-postgres.load"]
    networks:
      - tevunah

  redis:
    image: redis:7-alpine
    container_name: tevunah-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tevunah

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tevunah-backend
    working_dir: /app
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - tevunah-photos:/var/lib/tevunah/photos
    environment:
      APP_ENV: ${APP_ENV:-development}
      ADDR: ":8080"
      PHOTO_DIR: "/var/lib/tevunah/photos"
      # Migrations rodam como superuser; CRUD do app usa tevunah_app;
      # writer de audit usa tevunah_audit_writer.
      MIGRATIONS_DATABASE_URL: "postgres://${POSTGRES_USER:-tevunah}:${POSTGRES_PASSWORD:-tevunah}@postgres:5432/${POSTGRES_DB:-tevunah}?sslmode=disable"
      APP_DATABASE_URL:        "postgres://${APP_DB_USER:-tevunah_app}:${APP_DB_PASSWORD:-tevunah_app}@postgres:5432/${POSTGRES_DB:-tevunah}?sslmode=disable"
      AUDIT_DATABASE_URL:      "postgres://${AUDIT_DB_USER:-tevunah_audit_writer}:${AUDIT_DB_PASSWORD:-tevunah_audit_writer}@postgres:5432/${POSTGRES_DB:-tevunah}?sslmode=disable"
      REDIS_URL:               "redis://redis:6379/0"
      # Timeout idle de sessão em minutos. Default 15 (alinhado a NIST AAL2 /
      # OWASP para apps com dados sensíveis). Clamp [1, 60] no servidor.
      SESSION_IDLE_MINUTES:    "${SESSION_IDLE_MINUTES:-15}"
      # Seed dev — só usado pelo `admin seed-dev` quando APP_ENV=development
      DEV_ADMIN_EMAIL:    ${DEV_ADMIN_EMAIL:-admin@tevunah.local}
      DEV_ADMIN_NAME:     ${DEV_ADMIN_NAME:-Administrador Dev}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-tevunah-dev-12345}
      # Permite go run/build sem go.sum congelado em dev
      GOFLAGS: "-mod=mod"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tevunah

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tevunah-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    environment:
      # Usado pelo rewrite do Next em next.config.ts.
      BACKEND_INTERNAL_URL: "http://backend:8080"
    depends_on:
      - backend
    networks:
      - tevunah

volumes:
  postgres-data:
  redis-data:
  go-mod-cache:
  go-build-cache:
  frontend-node-modules:
  frontend-next-cache:
  tevunah-photos:

networks:
  tevunah:
    driver: bridge
